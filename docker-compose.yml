version: '3.8'

services:
  pdf-export-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: dsai-pdf-export-service:1.0.0
    container_name: dsai-pdf-export
    restart: unless-stopped
    ports:
      - "8098:8098"
    environment:
      - NODE_ENV=production
      - PORT=8098
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PUPPETEER_HEADLESS=${PUPPETEER_HEADLESS:-true}
      - PUPPETEER_TIMEOUT=${PUPPETEER_TIMEOUT:-60000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - .env
    volumes:
      # 持久化日志
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8098/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Puppeteer 需要增加共享内存
    shm_size: '2gb'
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 安全相关配置
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    networks:
      - pdf-network

networks:
  pdf-network:
    driver: bridge
