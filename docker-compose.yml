version: '3.8'

services:
  pdf-export-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: dsai-pdf-export-service:1.0.0
    container_name: dsai-pdf-export
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 添加其他需要的环境变量
      # - LOG_LEVEL=info
    # 如果需要 .env 文件，取消下面的注释
    # env_file:
    #   - .env
    volumes:
      # 持久化日志（可选）
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Puppeteer 需要增加共享内存
    shm_size: '2gb'
    # 安全相关配置
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    networks:
      - pdf-network

networks:
  pdf-network:
    driver: bridge
